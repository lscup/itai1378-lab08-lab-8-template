name: Autograding Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert pytest

    - name: syntaxcheck
      id: syntaxcheck
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Syntax Check"
        setup-command: python -c "import cv2, numpy as np, matplotlib.pyplot as plt, ipywidgets as widgets, IPython.display as display" && pip install opencv-python google ipython ipywidgets numpy matplotlib
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 10
        max-score: 20

    - name: browseimagefunctionality
      id: browseimagefunctionality
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Browse Image Functionality"
        setup-command: python -c "import cv2; import numpy as np; cv2.imwrite('test_image.png', np.ones((100, 100, 3), dtype=np.uint8) * 255)" && pip install opencv-python google ipython ipywidgets numpy matplotlib
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 10
        max-score: 20

    - name: converttograyscale
      id: converttograyscale
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Convert to Grayscale"
        setup-command: python -c "import cv2; import numpy as np; cv2.imwrite('test_image.png', np.ones((100, 100, 3), dtype=np.uint8) * 255)" && pip install opencv-python google ipython ipywidgets numpy matplotlib
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 10
        max-score: 20

    - name: adjustbrightness
      id: adjustbrightness
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Adjust Brightness"
        setup-command: python -c "import cv2; import numpy as np; cv2.imwrite('test_image.png', np.ones((100, 100, 3), dtype=np.uint8) * 255)" && pip install opencv-python google ipython ipywidgets numpy matplotlib
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 10
        max-score: 15

    - name: resizeimage
      id: resizeimage
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Resize Image"
        setup-command: python -c "import cv2; import numpy as np; cv2.imwrite('test_image.png', np.ones((100, 100, 3), dtype=np.uint8) * 255)" && pip install opencv-python google ipython ipywidgets numpy matplotlib
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 10
        max-score: 15

    - name: saveimage
      id: saveimage
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Save Image"
        setup-command: python -c "import cv2; import numpy as np; cv2.imwrite('test_image.png', np.ones((100, 100, 3), dtype=np.uint8) * 255)" && pip install opencv-python google ipython ipywidgets numpy matplotlib
        command: jupyter nbconvert --to notebook --execute notebook.ipynb --stdout
        timeout: 10
        max-score: 10

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        SYNTAXCHECK_RESULTS: "${{steps.syntaxcheck.outputs.result}}"
        BROWSEIMAGEFUNCTIONALITY_RESULTS: "${{steps.browseimagefunctionality.outputs.result}}"
        CONVERTTOGRAYSCALE_RESULTS: "${{steps.converttograyscale.outputs.result}}"
        ADJUSTBRIGHTNESS_RESULTS: "${{steps.adjustbrightness.outputs.result}}"
        RESIZEIMAGE_RESULTS: "${{steps.resizeimage.outputs.result}}"
        SAVEIMAGE_RESULTS: "${{steps.saveimage.outputs.result}}"
      with:
        runners: syntaxcheck,browseimagefunctionality,converttograyscale,adjustbrightness,resizeimage,saveimage
